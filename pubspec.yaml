name: tread_pro_fit
description: Live clustering and 1h prediction for Indian stocks
publish_to: "none"
environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  dio: ^5.7.0
  http: ^1.2.2
  web_socket_channel: ^3.0.1
  url_launcher: ^6.3.1
  flutter_inappwebview: ^6.1.5
  fl_chart: ^0.68.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  syncfusion_flutter_charts: ^33.2.3
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true